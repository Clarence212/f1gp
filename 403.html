<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>403 - Access Denied</title>
    <link rel="icon" type="image/png" href="/soft.png">
    <link rel="stylesheet" href="/style.css?v=1.3">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --accent-color: #e10600;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at top right, #330000 0%, transparent 40%),
                radial-gradient(circle at bottom left, #1a1a1a 0%, transparent 40%);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            margin: 0;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .f1-logo {
            height: 60px;
            width: auto;
            margin-right: 15px;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
        }

        .error-container {
            text-align: center;
            padding: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--accent-color);
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(225, 6, 0, 0.5);
            animation: pulse 3s infinite;
        }

        .error-title {
            font-size: 2rem;
            text-transform: uppercase;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .error-message {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .home-btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: #ff1e1e;
            box-shadow: 0 0 20px rgba(225, 6, 0, 0.6);
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% {
                text-shadow: 0 0 20px rgba(225, 6, 0, 0.5);
                transform: scale(1);
            }

            50% {
                text-shadow: 0 0 40px rgba(225, 6, 0, 0.8);
                transform: scale(1.05);
            }

            100% {
                text-shadow: 0 0 20px rgba(225, 6, 0, 0.5);
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="title-group">
                <img src="/soft.png" alt="F1 Logo" class="f1-logo">
                <h1>F1 Live Stream</h1>
            </div>
        </header>

        <main class="error-container">
            <h1 class="error-code">403</h1>
            <h2 class="error-title">Access Denied</h2> <!-- or Pit Lane Closed -->
            <p class="error-message">You don't have permission to access this resource. The stewards have flagged this
                sector.</p>
            <a href="/" class="home-btn">Return to Track</a>
        </main>

        <footer>
            <p>&copy; 2026 JCL. All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
